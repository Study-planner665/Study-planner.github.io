<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Smart Study Planner</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            font-family: Arial, sans-serif;

            background:
                linear-gradient(135deg,
                    #0f172a,
                    #1e3a8a,
                    #312e81,
                    #0f172a);

            background-size: 400% 400%;

            animation: gradientBG 12s ease infinite;

            color: white;

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            padding: 20px;
        }

        @keyframes gradientBG {

            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .container {

            width: 100%;
            max-width: 750px;

            background: rgba(30, 55, 59, 0.7);

            backdrop-filter: blur(15px);

            border: 1px solid rgba(255, 255, 255, 0.1);

            padding: 30px;

            border: 4px solid rgb(0, 255, 170);

            border-radius: 20px;

            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.35);
        }

        h1 {

            text-align: center;

            margin-bottom: 25px;

            font-size: 32px;
        }

        .input-group {

            display: flex;

            gap: 12px;

            margin-bottom: 15px;
        }

        input {

            flex: 1;

            padding: 14px;

            border: none;

            border-radius: 12px;

            outline: none;

            background: rgba(255, 255, 255, 0.1);

            color: white;

            font-size: 16px;

            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input::placeholder {
            color: #cbd5e1;
        }

        button {

            padding: 14px 20px;

            border: none;

            border-radius: 12px;

            background:
                linear-gradient(135deg,
                    #3bf63b,
                    #eb25b0);

            color: white;

            font-size: 15px;

            font-weight: bold;

            cursor: pointer;

            transition: 0.3s;

            box-shadow:
                0 0 10px rgba(37, 99, 235, 0.6),
                0 0 20px rgba(37, 99, 235, 0.4),
                0 0 40px rgba(37, 99, 235, 0.2);
        }

        button:hover {

            transform: translateY(-2px) scale(1.03);

            box-shadow:
                0 0 15px rgba(59, 130, 246, 0.9),
                0 0 30px rgba(59, 130, 246, 0.7),
                0 0 60px rgba(59, 130, 246, 0.5);
        }

        button:active {
            transform: scale(0.98);
        }

        .generate-btn {

            width: 100%;

            margin-top: 15px;
        }

        .subject-card {

            background: rgba(255, 255, 255, 0.08);

            border: 1px solid rgba(255, 255, 255, 0.08);

            padding: 15px;

            border-radius: 14px;

            margin-top: 12px;

            display: flex;

            justify-content: space-between;

            align-items: center;
        }

        .subject-info p {

            margin-top: 5px;

            color: #cbd5e1;
        }

        .delete-btn {

            background:
                linear-gradient(135deg,
                    #ef4444,
                    #dc2626);

            box-shadow:
                0 0 10px rgba(239, 68, 68, 0.6),
                0 0 20px rgba(239, 68, 68, 0.4);
        }

        .delete-btn:hover {

            box-shadow:
                0 0 15px rgba(239, 68, 68, 0.9),
                0 0 30px rgba(239, 68, 68, 0.7);
        }

        table {

            width: 100%;

            margin-top: 25px;

            border-collapse: collapse;

            overflow: hidden;

            border-radius: 15px;
        }

        th {

            background: #2563eb;

            padding: 15px;
        }

        td {

            padding: 15px;

            text-align: center;
        }

        tr:nth-child(even) {

            background: rgba(255, 255, 255, 0.08);
        }

        tr:nth-child(odd) {

            background: rgba(255, 255, 255, 0.04);
        }

        .plan-title {

            margin-top: 25px;

            text-align: center;

            font-size: 24px;
        }

        @media(max-width:700px) {

            .input-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            h1 {
                font-size: 26px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>📚 Smart Study Planner</h1>

        <div class="input-group">

            <input type="text" id="subject" placeholder="Enter Subject Name">

            <input type="number" id="difficulty" placeholder="Difficulty (1-5)" min="1" max="5">

            <button onclick="addSubject()">
                Add Subject
            </button>

        </div>

        <input type="number" id="studyHours" placeholder="Total Study Hours Per Day">

        <button class="generate-btn" onclick="generatePlan()">

            Generate Smart Plan

        </button>

        <div id="subjectContainer"></div>

        <div id="result"></div>

    </div>

    <script>

        let subjects = [];

        function addSubject() {

            let name =
                document.getElementById("subject")
                    .value
                    .trim();

            let difficulty =
                parseInt(
                    document.getElementById("difficulty").value
                );

            if (name === "" || isNaN(difficulty)) {

                alert("Please fill all fields");
                return;
            }

            if (difficulty < 1 || difficulty > 5) {

                alert("Difficulty must be between 1 and 5");
                return;
            }

            let duplicate =
                subjects.some(
                    sub =>
                        sub.name.toLowerCase() ===
                        name.toLowerCase()
                );

            if (duplicate) {

                alert("Subject already exists");
                return;
            }

            subjects.push({
                name,
                difficulty
            });

            renderSubjects();

            document.getElementById("subject").value = "";
            document.getElementById("difficulty").value = "";
        }

        function renderSubjects() {

            let container =
                document.getElementById("subjectContainer");

            container.innerHTML = "";

            subjects.forEach((sub, index) => {

                container.innerHTML += `

        <div class="subject-card">

            <div class="subject-info">

                <h3>${sub.name}</h3>

                <p>
                    Difficulty Level:
                    ${sub.difficulty}
                </p>

            </div>

            <button
            class="delete-btn"
            onclick="deleteSubject(${index})">

            Delete

            </button>

        </div>
        `;
            });
        }

        function deleteSubject(index) {

            subjects.splice(index, 1);

            renderSubjects();

            document.getElementById("result").innerHTML = "";
        }

        function generatePlan() {

            let totalHours =
                parseFloat(
                    document.getElementById("studyHours").value
                );

            if (subjects.length === 0) {

                alert("Please add subjects first");
                return;
            }

            if (isNaN(totalHours) || totalHours <= 0) {

                alert("Enter valid study hours");
                return;
            }

            let totalDifficulty = 0;

            subjects.forEach(sub => {

                totalDifficulty += sub.difficulty;
            });

            let html = `

    <h2 class="plan-title">
        📅 Your Study Plan
    </h2>

    <table>

        <tr>

            <th>Subject</th>

            <th>Difficulty</th>

            <th>Allocated Time</th>

        </tr>
    `;

            subjects.forEach(sub => {

                let studyTime =
                    (sub.difficulty / totalDifficulty)
                    * totalHours;

                let hrs =
                    Math.floor(studyTime);

                let mins =
                    Math.round((studyTime - hrs) * 60);

                if (mins === 60) {

                    hrs++;
                    mins = 0;
                }

                html += `

        <tr>

            <td>${sub.name}</td>

            <td>${sub.difficulty}</td>

            <td>
                ${hrs} Hr ${mins} Min
            </td>

        </tr>
        `;
            });

            html += `</table>`;

            document.getElementById("result").innerHTML = html;
        }

    </script>

</body>

</html>
